<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iOS 资源站</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="apple-stack" aria-hidden="true">
        <div class="stack-layer layer-back"></div>
        <div class="stack-layer layer-mid"></div>
        <div class="stack-layer layer-front">
          <svg viewBox="0 0 24 24"><path d="M16.5 13.1c0-2.1 1.7-3.1 1.8-3.2-1-1.5-2.5-1.7-3.1-1.7-1.3-.1-2.5.8-3.2.8-.7 0-1.8-.8-2.9-.8-1.5 0-2.9.9-3.7 2.2-1.6 2.8-.4 6.9 1.1 9.1.8 1.1 1.7 2.4 2.9 2.3 1.2 0 1.6-.7 3-.7s1.8.7 3 .7c1.3 0 2.1-1.1 2.8-2.2.9-1.3 1.2-2.5 1.2-2.6 0-.1-2.9-1.1-2.9-3.9Z"></path><path d="M14.4 6.9c.6-.8 1.1-1.8 1-2.9-1 .1-2 .6-2.7 1.4-.6.7-1.1 1.8-1 2.8 1 .1 2.1-.5 2.7-1.3Z"></path></svg>
        </div>
      </div>

      <h1>iOS 资源站</h1>
      <p>一站式 iOS 开发资源中心</p>
      <a class="primary-cta" href="https://shop.zmfaka.cn/shop/PST81QJX">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 15c-1.2 1.1-1.9 2.8-2 5 2.2-.1 3.9-.8 5-2"></path><path d="M9 15 5 11l4-4c3.3-3.3 7.2-4.6 11-4-.6 3.8-1.9 7.7-5.2 11L11 18l-2-3Z"></path><circle cx="15" cy="9" r="2"></circle></svg>
        卡网下单（科技购买）
      </a>
    </header>

    <section class="section categories" aria-labelledby="categories-title">
      <div class="section-header">
        <h2 id="categories-title">便捷菜单</h2>
      </div>

      <div class="category-grid">
        <a class="category-card" href="https://t.me/adasivip">
          <span class="category-icon icon-blue">
            <svg viewBox="0 0 24 24"><path d="M21 4 3 11.5l7 2.4L16.5 8 12 15.4V21l3.3-3.6L19 19 21 4Z"></path></svg>
          </span>
          <span class="category-copy"><strong>TG频道</strong><small>获取最新公告、资源更新与活动信息</small></span>
          <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </a>

        <a class="category-card" href="/categories/code-libraries">
          <span class="category-icon icon-purple">
            <svg viewBox="0 0 24 24"><path d="M12 3v11"></path><path d="m7 10 5 5 5-5"></path><path d="M5 20h14"></path><path d="M6 16v4"></path><path d="M18 16v4"></path></svg>
          </span>
          <span class="category-copy"><strong>辅助下载</strong><small>下载辅助工具、安装包与相关资源</small></span>
          <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </a>

        <a class="category-card" href="#qq-modal">
          <span class="category-icon icon-pink">
            <svg viewBox="0 0 24 24"><path d="M7 18 3 21v-4.5A7.5 7.5 0 0 1 10.5 9h3A7.5 7.5 0 0 1 21 16.5v0A1.5 1.5 0 0 1 19.5 18H7Z"></path><path d="M8 6.5A3.5 3.5 0 0 1 11.5 3h1A3.5 3.5 0 0 1 16 6.5"></path><path d="M9 14h.01"></path><path d="M12 14h.01"></path><path d="M15 14h.01"></path></svg>
          </span>
          <span class="category-copy"><strong>QQ通知群</strong><small>加入 QQ 群接收通知与重要提醒</small></span>
          <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </a>

        <a class="category-card" href="/categories/tutorials">
          <span class="category-icon icon-orange">
            <svg viewBox="0 0 24 24"><path d="M4 13v-1a8 8 0 0 1 16 0v1"></path><path d="M5 13h3v6H5a2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2Z"></path><path d="M19 13h-3v6h3a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2Z"></path><path d="M16 19c0 1.1-.9 2-2 2h-2"></path></svg>
          </span>
          <span class="category-copy"><strong>TG售后客服</strong><small>联系 Telegram 客服获取售后支持</small></span>
          <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </a>

        <a class="category-card" href="/categories/tools">
          <span class="category-icon icon-green">
            <svg viewBox="0 0 24 24"><path d="M5 15c-1.1 1-1.7 2.6-1.8 4.8 2.2-.1 3.8-.7 4.8-1.8"></path><path d="M9 15 6 12l3-3c3.2-3.2 6.9-4.5 10.6-4- .5 3.7-1.8 7.4-5 10.6L12 18l-3-3Z"></path><circle cx="14.5" cy="9.5" r="1.8"></circle></svg>
          </span>
          <span class="category-copy"><strong>开发工具</strong><small>开发者工具与效率应用</small></span>
          <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </a>

        <a class="category-card" href="/categories/documentation">
          <span class="category-icon icon-dark-blue">
            <svg viewBox="0 0 24 24"><path d="M4 5.5C6.4 4.6 8.7 4.9 11 6v14c-2.3-1.1-4.6-1.4-7-.5v-14Z"></path><path d="M20 5.5c-2.4-.9-4.7-.6-7 .5v14c2.3-1.1 4.6-1.4 7-.5v-14Z"></path></svg>
          </span>
          <span class="category-copy"><strong>开发文档</strong><small>官方文档与参考资料</small></span>
          <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg>
        </a>
      </div>
    </section>

    <section class="premium-banner" aria-labelledby="premium-title">
      <div class="premium-copy">
        <h2 id="premium-title">精选 iOS 资源</h2>
        <p>为 iOS 开发者精选的高质量资源合集</p>
        <a href="/premium" class="premium-button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 8 4.5 4L12 5l4.5 7L21 8l-2 11H5L3 8Z"></path><path d="M7 22h10"></path></svg>
          开通精选
        </a>
      </div>
      <div class="premium-visual" aria-hidden="true">
        <div class="glow-card card-one"></div>
        <div class="glow-card card-two"></div>
        <div class="mock-device">
          <div class="device-screen">
            <span></span><span></span><span></span><span></span>
            <i></i><i></i><i></i><i></i>
          </div>
        </div>
      </div>
    </section>

    <section class="section popular" id="resources" aria-labelledby="popular-title">
      <div class="section-header">
        <h2 id="popular-title">热门资源</h2>
        <a href="/resources" class="view-all">查看全部 <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"></path></svg></a>
      </div>

      <article class="resource-card">
        <div class="swiftui-icon" aria-hidden="true">
          <span class="mark mark-pink"></span>
          <span class="mark mark-blue"></span>
          <span class="mark mark-purple"></span>
        </div>
        <div class="resource-copy">
          <h3>SwiftUI 组件套件</h3>
          <p>适用于 iOS 应用的精美可定制 SwiftUI 组件</p>
        </div>
        <div class="resource-meta">
          <span class="pill">UI 套件</span>
          <span class="rating"><svg viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z"></path></svg>4.8</span>
        </div>
      </article>
    </section>

    <div class="qq-modal" id="qq-modal" role="dialog" aria-modal="true" aria-labelledby="qq-modal-title">
      <a class="modal-backdrop" href="#" aria-label="关闭弹窗"></a>
      <div class="modal-panel">
        <a class="modal-close" href="#" aria-label="关闭弹窗">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12"></path><path d="M18 6 6 18"></path></svg>
        </a>
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 18 3 21v-4.5A7.5 7.5 0 0 1 10.5 9h3A7.5 7.5 0 0 1 21 16.5v0A1.5 1.5 0 0 1 19.5 18H7Z"></path><path d="M8 6.5A3.5 3.5 0 0 1 11.5 3h1A3.5 3.5 0 0 1 16 6.5"></path><path d="M9 14h.01"></path><path d="M12 14h.01"></path><path d="M15 14h.01"></path></svg>
        </div>
        <h2 id="qq-modal-title">QQ通知群</h2>
        <p>请选择要加入的通知群</p>
        <div class="modal-actions">
          <a href="https://qm.qq.com/q/NDxBOzEmsK" target="_blank" rel="noopener noreferrer">加入一群</a>
          <a href="https://qm.qq.com/q/vuWDpJLof6" target="_blank" rel="noopener noreferrer">加入二群</a>
        </div>
      </div>
    </div>

  </main>
</body>
</html>
